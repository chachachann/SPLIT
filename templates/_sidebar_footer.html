<div class="sidebar-footer">
    {% include '_sidebar_profile_badge.html' %}
    <div class="theme-switcher" aria-label="Theme settings">
        <div class="theme-switcher-copy">
            <span class="theme-switcher-title">Appearance</span>
            <span class="theme-switcher-state" data-theme-label>Dark mode</span>
        </div>

        <button type="button" class="theme-toggle" data-theme-toggle role="switch" aria-checked="false" aria-label="Switch between dark mode and light mode">
            <svg class="theme-toggle-icon theme-toggle-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M20.08 14.09A8.5 8.5 0 0 1 9.91 3.92a.75.75 0 0 0-.98-.98A10 10 0 1 0 21.06 15.07a.75.75 0 0 0-.98-.98Z"></path>
            </svg>
            <span class="theme-toggle-track" aria-hidden="true"><span class="theme-toggle-thumb"></span></span>
            <svg class="theme-toggle-icon theme-toggle-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2.75V5.25M12 18.75V21.25M21.25 12H18.75M5.25 12H2.75M18.54 5.46L16.77 7.23M7.23 16.77L5.46 18.54M18.54 18.54L16.77 16.77M7.23 7.23L5.46 5.46"></path>
            </svg>
        </button>
    </div>
</div>
