<!DOCTYPE html>
<html>
<head>
    <title>DAR Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-body">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <div class="burger" onclick="toggleSidebar()">☰</div>
    </div>

<div class="menu">
    <button class="menu-btn">
        <span class="menu_icon">📞</span>
        <span class="label">Contact Admin</span>
    </button>

    <button class="menu-btn">
        <span class="menu_icon">ℹ️</span>
        <span class="label">About</span>
    </button>

    <button class="menu-btn">
        <span class="menu_icon">❓</span>
        <span class="label">Help</span>
    </button>

    <button class="menu-btn">
        <span class="menu_icon">📰</span>
        <span class="label">News</span>
    </button>
</div>
</div>

<!-- LOGO -->
<img src="{{ url_for('static', filename='images/DAR_logo.png') }}" class="logo">

<!-- LOGIN -->
<div class="login-container">
    <h1>DAR Negros Island Region</h1><br>
    <h2>Project SPLIT</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <label class="remember">
            <input type="checkbox" name="remember"> Remember Me (7 days)
        </label>

        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>

<!-- MARQUEE -->
<div class="marquee">
    <p>Dedicated website of DAR-NIR for Project SPLIT Automation</p>
</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
}
</script>

</body>
</html>
